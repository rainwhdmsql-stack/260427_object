<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>객체</title>
  </head>
  <body>
    <script>
      // 자바스크립트 표준 내장 객체
      // 1. String 2. Array 3. Date 4. Math

      // 1. String
      const str = "hello world";
      console.log(str);
      console.log(str.length); //   문자의 길이를 알 수 있는 속성
      console.log(str.toUpperCase()); //   대문자로 변경하는 메서드
      console.log(str.includes("worlds")); //   해당하는 내용이 있는지 없는지

      //   2. Arrey
      const arr = [1, 2, 3, 4];
      console.log(arr.length);
      console.log(arr.push(5));
      console.log(arr);
      console.log(arr.join("=="));

      // 3. Date 4
      const today = new Date();
      console.log(today);
      console.log(today.toDateString()); //   현재 날짜
      console.log(today.getFullYear()); //   연도
      console.log(today.getMonth()); //  월(0부터 출력하기 때문에 + 1)

      //   4. math
      console.log(Math.PI);
      console.log(Math.max(10, 23, 100));
      console.log(Math.min(10, 23, 100));
      console.log(Math.random());
    </script>
  </body>
</html>
